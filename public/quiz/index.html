<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Quiz</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // Global Configuration
        window.COLORS = {
            bg: '#0D2436',
            bgLight: '#132F45',
            bgCard: '#1A3A52',
            cta: '#7FC241',
            ctaHover: '#8FD251',
            highlight: '#406AFF',
            highlightSoft: 'rgba(64, 106, 255, 0.15)',
            text: '#FFFFFF',
            textMuted: '#8BA3B9',
            textDim: '#5A7A94',
            warning: '#FF6B4A',
            warningBg: 'rgba(255, 107, 74, 0.12)',
            success: '#4ADE80',
            successBg: 'rgba(74, 222, 128, 0.12)',
        };

        window.RISK_FLAGS = [
            { id: 'gaps', label: 'Employment gaps', icon: '⏸' },
            { id: 'hopping', label: 'Job-hopping pattern', icon: '↺' },
            { id: 'overstate', label: 'Skill overstatement', icon: '⚠' },
            { id: 'culture', label: 'Cultural mismatch', icon: '👥' },
        ];

        window.MOCK_CANDIDATES = [
            { id: 1, name: 'Priya Sharma', role: 'Senior Recruiter', company: 'Razorpay', experience: '6 years', skills: ['Full-cycle recruiting', 'Tech hiring', 'ATS management'], match: 95, flags: [], mustHave: true, brandName: true, growth: true, immediate: true },
            { id: 2, name: 'Arjun Mehta', role: 'HR Business Partner', company: 'Flipkart', experience: '4 years', skills: ['Stakeholder management', 'Comp & Ben', 'Policy'], match: 72, flags: ['Adjacent experience'], mustHave: false, brandName: true, growth: true, immediate: false },
            { id: 3, name: 'Kavitha Rajan', role: 'Talent Acquisition Lead', company: 'Freshworks', experience: '5 years', skills: ['Volume hiring', 'Campus recruitment', 'Employer branding'], match: 88, flags: [], mustHave: true, brandName: true, growth: false, immediate: true },
            { id: 4, name: 'Rahul Deshmukh', role: 'Recruiting Coordinator', company: 'TCS', experience: '3 years', skills: ['Interview scheduling', 'Onboarding', 'Data entry'], match: 45, flags: ['Skill gap', 'Junior level'], mustHave: false, brandName: true, growth: true, immediate: true },
            { id: 5, name: 'Sneha Kulkarni', role: 'HR Manager', company: 'Early-stage startup', experience: '7 years', skills: ['Full-cycle HR', 'Compliance', 'Team building'], match: 82, flags: ['Job hopping (3 roles in 4 years)'], mustHave: true, brandName: false, growth: true, immediate: false },
            { id: 6, name: 'Vikram Iyer', role: 'Technical Recruiter', company: 'Microsoft', experience: '8 years', skills: ['Engineering hiring', 'Sourcing', 'Offer negotiation'], match: 91, flags: [], mustHave: true, brandName: true, growth: false, immediate: false },
            { id: 7, name: 'Ananya Nair', role: 'People Operations', company: 'Zerodha', experience: '2 years', skills: ['HRIS', 'Payroll support', 'Documentation'], match: 38, flags: ['Limited recruiting exp', 'Junior'], mustHave: true, brandName: true, growth: true, immediate: true },
            { id: 8, name: 'Deepak Verma', role: 'Recruitment Manager', company: 'Infosys', experience: '9 years', skills: ['Bulk hiring', 'Vendor management', 'SLA tracking'], match: 68, flags: ['Employment gap (8 months)'], mustHave: false, brandName: true, growth: false, immediate: true },
        ];

        // Tracking stubs (no analytics in quiz mode)
        window.trackEvent = function (eventName, params) {
            console.log('📊 Track:', eventName, params);
        };

        // Skill-to-simulation index mapping
        // 3 simulations across 5 skills — skills cycle through available sims
        window.SKILL_SIM_MAP = {
            'skill-1': 0,
            'skill-2': 1,
            'skill-3': 2,
            'skill-4': 0,
            'skill-5': 1,
        };
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0D2436;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #root {
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div id="root" style="max-width: 600px; margin: 0 auto;"></div>
    <script type="text/babel" src="hr-simulation.jsx"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const UI_VERSION_MAP = {
            'simulation_1-5': 'v1',
            'simulation_v2_1-5': 'v2',
            'simulation_v3_1-5': 'v3',
            'v4': 'v3',
            'cert': 'v3',
            'proj': 'v3'
        };

        function AppWrapper() {
            const [data, setData] = useState(null);
            const [engineReady, setEngineReady] = useState(false);
            const [uiVersion, setUiVersion] = useState('v2');

            const params = new URLSearchParams(window.location.search);
            const skillId = params.get('skill') || '';
            const returnUrl = params.get('return') || '/';
            const simIndexOverride = window.SKILL_SIM_MAP[skillId];

            useEffect(() => {
                const simId = params.get('sim') || 'v4';
                const jsonPath = `${simId}.json?t=${Date.now()}`;
                const detectedVersion = UI_VERSION_MAP[simId] || 'v2';
                setUiVersion(detectedVersion);

                fetch(jsonPath)
                    .then(r => {
                        if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`);
                        return r.json();
                    })
                    .then(d => {
                        // Pick only the simulation that maps to this skill
                        if (skillId && simIndexOverride !== undefined && d.simulations) {
                            const idx = Math.min(simIndexOverride, d.simulations.length - 1);
                            d.simulations = [d.simulations[idx]];
                        }
                        window.SIMULATION_DATA = d;
                        window.UI_VERSION = detectedVersion;

                        // Tell the engine to auto-redirect on completion
                        const itemId = params.get('cert') || params.get('proj') || skillId;
                        window.QUIZ_SKILL_ID = itemId;
                        window.QUIZ_RETURN_URL = returnUrl;

                        setData(d);
                    })
                    .catch(err => {
                        console.error("Failed to load JSON:", err);
                        setData({ error: true, message: `Failed to load ${jsonPath}.` });
                    });

                const timer = setInterval(() => {
                    if (window.HRSimulationApp) {
                        setEngineReady(true);
                        clearInterval(timer);
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            // Intercept simulation completion — save results & redirect
            useEffect(() => {
                const simId = params.get('sim') || 'v4';
                const itemId = params.get('cert') || params.get('proj') || skillId;
                if (!itemId) return;

                const profileUrl = `${returnUrl}?completed=${itemId}`;

                // Auto-redirect as soon as the completion screen appears — hide it instantly
                const observer = new MutationObserver(() => {
                    const endBtn = document.querySelector('#reset-path, #unlock-next');
                    if (endBtn) {
                        observer.disconnect();
                        // Hide everything instantly so user doesn't see the results screen
                        document.getElementById('root').style.opacity = '0';
                        saveResultsAndRedirect(profileUrl, itemId);
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });
                return () => observer.disconnect();
            }, [skillId, returnUrl]);

            if (!data) return <div style={{ color: '#8BA3B9', padding: '40px', textAlign: 'center' }}>Loading quiz...</div>;
            if (!engineReady) return <div style={{ color: '#8BA3B9', padding: '40px', textAlign: 'center' }}>Initializing...</div>;

            return <window.HRSimulationApp simulationData={data} uiVersion={uiVersion} />;
        }

        function saveResultsAndRedirect(profileUrl, itemId) {
            const simData = window.SIMULATION_DATA;
            const sim = simData?.simulations?.[0];
            const metadata = sim?.simulation_metadata || {};

            // Try to get history from engine globals, fall back to scraping DOM
            let history = window.QUIZ_USER_HISTORY || [];
            let score = window.QUIZ_SCORE || 0;

            // If engine didn't expose history, try to scrape from the results DOM
            if (history.length === 0) {
                try {
                    const steps = sim?.step_level_design || [];
                    // Check for stored answers in the engine
                    const answers = window.QUIZ_ANSWERS || {};
                    steps.forEach((step, idx) => {
                        const userIdx = answers[idx];
                        const options = step.blank_options || step.clickable_options || [];
                        const correctIdx = step.correct_answer_index ?? 0;
                        const userAnswer = options[userIdx] || options[0] || '';
                        const correctAnswer = options[correctIdx] || '';
                        const isCorrect = userIdx === correctIdx;
                        const type = isCorrect ? 'correct' : (userIdx === 1 ? 'partial' : 'incorrect');

                        history.push({
                            question: step.instruction_question || `Step ${idx + 1}`,
                            userAnswer: userAnswer,
                            correctAnswer: correctAnswer,
                            outcomeText: isCorrect
                                ? (step.outcomes?.correct || '')
                                : (step.outcomes?.incorrect || step.outcomes?.partially_correct || ''),
                            type: type
                        });

                        if (isCorrect) score += 100;
                    });
                } catch (e) {
                    console.error('Failed to build history:', e);
                }
            }

            const result = {
                skillId: itemId,
                simTitle: metadata.simulation_title || '',
                impactMetrics: metadata.impact_metrics || null,
                score: score,
                history: history,
                timestamp: Date.now(),
            };

            // Store in localStorage
            localStorage.setItem(`quiz_result_${itemId}`, JSON.stringify(result));
            window.location.href = profileUrl;
        }

        const rootNode = document.getElementById('root');
        const root = ReactDOM.createRoot(rootNode);
        root.render(<AppWrapper />);
    </script>
</body>

</html>
